<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edge33 PRO</title>

<style>
body{margin:0;background:#0b0f14;color:#fff;font-family:Arial}
.container{padding:20px}
input,select,textarea{width:100%;padding:10px;margin:5px 0;background:#111;border:1px solid #333;color:#fff;border-radius:8px}
button{padding:10px 15px;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.primary{background:#22c982;color:#000}
.danger{background:#ff5f6d;color:#000}
.table{margin-top:20px;width:100%;border-collapse:collapse}
.table td,.table th{border-bottom:1px solid #333;padding:8px}
</style>

</head>

<body>
<div class="container">

<h2>Edge33 PRO</h2>

<h3>Nueva operación</h3>

<input id="asset" placeholder="Activo">

<select id="direction">
<option>Long</option>
<option>Short</option>
</select>

<input id="entry" type="number" placeholder="Entrada">
<input id="exit" type="number" placeholder="Salida">
<input id="stop" type="number" placeholder="Stop Loss">

<hr>

<input id="horaApertura" type="time">
<input id="horaCierre" type="time">
<input id="duracion" placeholder="Duración (auto)" disabled>

<input id="slPips" type="number" placeholder="SL pips">
<input id="tpPips" type="number" placeholder="TP pips">

<select id="contexto">
<option value="">Contexto</option>
<option value="rango">Rango</option>
<option value="tendencia">Tendencia</option>
</select>

<input id="cantidadOperaciones" type="number" placeholder="# Operaciones">

<input id="resultadoR" type="number" step="0.1" placeholder="Resultado en R">

<select id="noticias">
<option value="">Noticias</option>
<option value="si">Sí</option>
<option value="no">No</option>
</select>

<textarea id="notes" placeholder="Notas"></textarea>

<button class="primary" onclick="addTrade()">Agregar operación</button> <button class="danger" onclick="clearAll()">Limpiar</button>

<h3>Trades</h3>

<table class="table">
<thead>
<tr>
<th>#</th>
<th>Activo</th>
<th>R</th>
<th>Contexto</th>
<th>Duración</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<script>
let trades = JSON.parse(localStorage.getItem("trades")||"[]");

function calcularDuracion(a,c){
 if(!a||!c) return 0;
 let [h1,m1]=a.split(":").map(Number);
 let [h2,m2]=c.split(":").map(Number);
 return (h2*60+m2)-(h1*60+m1);
}

function calcR(t){
 let entry=t.entry, exit=t.exit, stop=t.stop;
 let pnl = t.direction=="Long"? exit-entry : entry-exit;
 let risk = Math.abs(entry-stop);
 let r = risk>0 ? pnl/risk : 0;
 if(t.resultadoManual) r=t.resultadoManual;
 return r;
}

function addTrade(){

 let apertura=document.getElementById("horaApertura").value;
 let cierre=document.getElementById("horaCierre").value;
 let duracion=calcularDuracion(apertura,cierre);

 document.getElementById("duracion").value=duracion;

 let trade={
  asset:asset.value,
  direction:direction.value,
  entry:Number(entry.value),
  exit:Number(exit.value),
  stop:Number(stop.value),

  horaApertura:apertura,
  horaCierre:cierre,
  duracion:duracion,

  slPips:Number(slPips.value),
  tpPips:Number(tpPips.value),
  contexto:contexto.value,
  cantidadOperaciones:Number(cantidadOperaciones.value),
  noticias:noticias.value,

  resultadoManual:Number(resultadoR.value),
  notes:notes.value
 };

 trade.r = calcR(trade);

 trades.push(trade);
 localStorage.setItem("trades",JSON.stringify(trades));

 render();
}

function render(){
 let tbody=document.getElementById("tbody");
 tbody.innerHTML="";

 trades.forEach((t,i)=>{
  tbody.innerHTML+=`
  <tr>
   <td>${i+1}</td>
   <td>${t.asset}</td>
   <td>${t.r.toFixed(2)}R</td>
   <td>${t.contexto}</td>
   <td>${t.duracion}m</td>
   <td><button onclick="del(${i})">X</button></td>
  </tr>
  `;
 });
}

function del(i){
 trades.splice(i,1);
 localStorage.setItem("trades",JSON.stringify(trades));
 render();
}

function clearAll(){
 if(confirm("Borrar todo?")){
  trades=[];
  localStorage.removeItem("trades");
  render();
 }
}

render();
</script>

</body>
</html>
