<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edge33 Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0d1117;
    color: #fff;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    background: #111827;
    padding: 20px;
    height: 100vh;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 20px;
}

.btn {
    background: linear-gradient(90deg,#7c3aed,#9333ea);
    border: none;
    padding: 12px;
    width: 100%;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    margin-bottom: 20px;
}

.menu a {
    display: block;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    text-decoration: none;
    color: #9ca3af;
}

.menu a.active {
    background: #1f2937;
    color: white;
}

/* MAIN */
.main {
    flex: 1;
    padding: 30px;
}

/* CARDS */
.cards {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
}

.card {
    background: #111827;
    padding: 20px;
    border-radius: 15px;
    width: 200px;
}

.green {
    color: #22c55e;
    font-size: 24px;
}

/* FORM */
.form {
    background: #111827;
    padding: 20px;
    border-radius: 15px;
    max-width: 600px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    margin-bottom: 15px;
    background: #0d1117;
    border: 1px solid #1f2937;
    color: white;
    border-radius: 8px;
}

.save-btn {
    background: #22c55e;
    border: none;
    padding: 12px;
    width: 100%;
    border-radius: 10px;
    cursor: pointer;
    color: black;
}

/* TABLE */
table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #1f2937;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">Edge33</div>

    <button class="btn">+ Agregar operación</button>

    <div class="menu">
        <a href="#" class="active">Dashboard</a>
        <a href="#">Registro</a>
        <a href="#">Gráficas</a>
        <a href="#">Análisis</a>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <div class="cards">
        <div class="card">
            <p>P&L Total</p>
            <div class="green" id="pnl">$0</div>
        </div>

        <div class="card">
            <p>Win Rate</p>
            <div class="green" id="winrate">0%</div>
        </div>
    </div>

    <div class="form">
        <h2>Nueva operación</h2>

        <input type="date" id="fecha">
        <input type="text" id="activo" placeholder="Activo (Ej: XAUUSD)">
        <input type="number" id="resultado" placeholder="Resultado ($)">
        <textarea id="notas" placeholder="Notas..."></textarea>

        <button class="save-btn" onclick="guardar()">Guardar operación</button>
    </div>

    <table id="tabla">
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Activo</th>
                <th>Resultado</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

</div>

<script>

let operaciones = JSON.parse(localStorage.getItem("ops")) || [];

function guardar() {
    let op = {
        fecha: document.getElementById("fecha").value,
        activo: document.getElementById("activo").value,
        resultado: parseFloat(document.getElementById("resultado").value)
    };

    operaciones.push(op);
    localStorage.setItem("ops", JSON.stringify(operaciones));

    render();
}

function render() {
    let tabla = document.querySelector("#tabla tbody");
    tabla.innerHTML = "";

    let total = 0;
    let wins = 0;

    operaciones.forEach(op => {
        total += op.resultado;
        if(op.resultado > 0) wins++;

        tabla.innerHTML += `
            <tr>
                <td>${op.fecha}</td>
                <td>${op.activo}</td>
                <td>${op.resultado}</td>
            </tr>
        `;
    });

    document.getElementById("pnl").innerText = "$" + total;

    let wr = operaciones.length ? (wins / operaciones.length * 100).toFixed(1) : 0;
    document.getElementById("winrate").innerText = wr + "%";
}

render();

</script>

</body>
</html>
